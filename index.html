<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death Pile Sorter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --keep: #10b981;
            --send: #0ea5e9;
            --lower: #eab308;
            --rework: #06b6d4;
            --bundle: #a855f7;
            --donate: #dc2626;
            --fbm: #7f1d1d;
            --notlisted: #f97316;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-dim: #cbd5e1;
            --border: #334155;
        }

        body {
            background: linear-gradient(135deg, var(--bg) 0%, #1a1f35 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 12px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 16px 0;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #06b6d4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .session-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 12px;
        }

        .upload-section {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #06b6d4, #0ea5e9);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }

        .btn-secondary:active {
            background: #475569;
        }

        #fileInput, #cameraInput {
            display: none;
        }

        .preview-container {
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        #preview {
            width: 100%;
            height: auto;
            display: block;
            max-height: 300px;
            object-fit: cover;
        }

        .result-card {
            background: var(--card);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border: 2px solid var(--border);
            border-left: 5px solid var(--keep);
            animation: slideIn 0.3s ease-out;
        }

        .result-card.send { border-left-color: var(--send); }
        .result-card.lower { border-left-color: var(--lower); }
        .result-card.rework { border-left-color: var(--rework); }
        .result-card.bundle { border-left-color: var(--bundle); }
        .result-card.donate { border-left-color: var(--donate); }
        .result-card.fbm { border-left-color: var(--fbm); }
        .result-card.notlisted { border-left-color: var(--notlisted); }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .action-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-badge.keep { background: var(--keep); color: white; }
        .action-badge.send { background: var(--send); color: white; }
        .action-badge.lower { background: var(--lower); color: #000; }
        .action-badge.rework { background: var(--rework); color: white; }
        .action-badge.bundle { background: var(--bundle); color: white; }
        .action-badge.donate { background: var(--donate); color: white; }
        .action-badge.fbm { background: var(--fbm); color: white; }
        .action-badge.notlisted { background: var(--notlisted); color: white; }

        .item-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .item-details {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .reason {
            font-size: 12px;
            color: var(--text-dim);
            font-style: italic;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .bundle-contents {
            background: rgba(168, 85, 247, 0.1);
            padding: 10px;
            border-radius: 4px;
            margin-top: 8px;
            font-size: 12px;
        }

        .bundle-contents strong {
            color: var(--bundle);
        }

        .bundle-item {
            color: var(--text-dim);
            margin: 4px 0;
            padding-left: 12px;
        }

        .summary-section {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .summary-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--bundle);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bundle-summary {
            font-size: 13px;
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(168, 85, 247, 0.05);
            border-left: 3px solid var(--bundle);
            border-radius: 4px;
        }

        .bundle-status {
            font-size: 12px;
            color: var(--text-dim);
        }

        .bundle-status.ready {
            color: var(--keep);
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 16px;
            color: var(--text-dim);
            font-size: 13px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--send);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(220, 38, 38, 0.1);
            border: 2px solid var(--donate);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .btn-small {
            flex: 1;
            padding: 10px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }

        .btn-small.reset {
            background: var(--border);
            color: var(--text);
        }

        .btn-small.reset:active {
            background: #475569;
        }

        .btn-small.summary {
            background: linear-gradient(135deg, var(--bundle), #a855f7);
            color: white;
        }

        .btn-small.summary:active {
            transform: scale(0.98);
        }

        .scan-count {
            text-align: center;
            padding: 8px;
            background: rgba(168, 85, 247, 0.1);
            border-radius: 4px;
            font-size: 12px;
            color: var(--bundle);
            font-weight: 600;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ DEATH PILE</h1>
            <div class="session-info">
                <span id="itemCount">Items scanned: 0</span>
                <button class="btn-small reset" onclick="resetSession()" style="width: auto; padding: 6px 12px;">New Session</button>
            </div>
        </header>

        <div class="upload-section">
            <button class="btn btn-primary" onclick="document.getElementById('cameraInput').click()">📷 Camera</button>
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📁 Upload</button>
        </div>

        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleFileSelect(event)">

        <div id="previewContainer"></div>
        <div id="loading"></div>
        <div id="error"></div>
        <div id="result"></div>

        <div id="scanHistory" class="scan-count" style="display: none;"></div>
        <div id="bundleSummaryContainer"></div>

        <div class="action-buttons" style="margin-top: 20px;">
            <button class="btn-small summary" onclick="showBundleSummary()">📊 Summary</button>
            <button class="btn-small reset" onclick="resetSession()">🔄 Reset</button>
        </div>
    </div>

    <script>
        // April's known items database
        const knownItems = {
            "Icelandic Design Sweater S Fair Isle Nordic Après-Ski Cabincore Winter Knit $64.99": { action: "KEEP", reason: "2 watchers", category: "Cabincore" },
            "Alfani Womens Plus 2X Top Periwinkle Blue Tiered Coquette Office Chic Blouse NWT $37": { action: "KEEP", reason: "5 views 1 watcher", category: "Basiccore" },
            "Columbia Womens Lillian Ridge Hooded Rain Jacket Sage Green XL $36.99": { action: "KEEP", reason: "21 views", category: "Cabincore" },
            "Ben Sherman Men's XL Green Plaid Trim Polo $35": { action: "KEEP", reason: "monitor", category: "Old Money" },
            "Life is Good Tie Dye Tank Top S Rainbow Heart $24": { action: "KEEP", reason: "1 watcher", category: "Boho" },
            "Patagonia Organic Cotton Halter Dress Medium $24": { action: "REWORK + RAISE", reason: "Check comps, $45-75", category: "Basiccore", details: "Rework title, raise price to $45-75" },
            "Eddie Bauer Women's Purple Knit Sweater Ruana Cabincore $25": { action: "KEEP", reason: "1 watcher", category: "Cabincore" },
            "O'Neill Women's Swimsuit Cover-Up White Mesh M/L $26.99": { action: "KEEP", reason: "seasonal summer", category: "Athleisure", details: "List Mar 1 - Aug 31" },
            "Tommy Hilfiger Polo Dress XS Preppy Old Money Pink Stripe $19.99": { action: "KEEP", reason: "1 watcher", category: "Old Money" },
            "J.Crew Black Label 100% Merino Wool Striped Sweater XS $30": { action: "KEEP", reason: "just listed", category: "Basiccore" },
            "VS PINK Victoria's Secret Sequin Raglan Shirt M Y2K $18.99": { action: "SEND OFFER IMMEDIATELY", reason: "8 watchers", category: "Y2K", details: "High priority" },
            "Vintage Style Mens Green Military Parka L Gorpcore $31.99": { action: "SEND OFFER", reason: "5 watchers", category: "Cabincore", details: "Send offer today" },
            "Buffalo David Bitton Top XL Blue Coastal Grandmacore $29": { action: "SEND OFFER", reason: "4 watchers", category: "Grandmacore", details: "Send offer today" },
            "Levi's 529 Womens Curvy Bootcut Jeans Size 8 $28.99": { action: "LOWER PRICE", reason: "Lower to $22", category: "Basiccore", details: "New price: $22" },
        };

        // Bundle category keywords
        const bundleKeywords = {
            "Cottagecore": ["floral", "crochet", "lace", "prairie", "whimsical", "cottagecore", "fairycore"],
            "Grandmacore": ["j.jill", "chico's", "orvis", "knit", "embroidered", "coastal", "quiet luxury"],
            "Cabincore": ["flannel", "fleece", "wool", "fair isle", "utility", "outdoor", "plaid", "gorpcore", "military"],
            "Boho": ["tie dye", "paisley", "fringe", "maxi", "kimono", "metallic", "jewel tone", "whimsigoth"],
            "Y2K": ["vs pink", "graphic", "sequin", "raglan", "mini skirt", "vintage logo"],
            "Old Money": ["tommy hilfiger", "ralph lauren", "polo", "stripe", "tennis", "blazer", "cable knit"],
            "Athleisure": ["leggings", "capris", "sports", "zip vest", "puffer vest", "activewear", "pilates"],
            "Basiccore": ["neutral", "minimal", "cream", "white", "black", "tan", "gray", "linen", "cotton", "merino"],
        };

        let sessionData = {
            items: [],
            bundles: {}
        };

        function loadSession() {
            const saved = localStorage.getItem('deathPileSession');
            if (saved) {
                sessionData = JSON.parse(saved);
            }
        }

        function saveSession() {
            localStorage.setItem('deathPileSession', JSON.stringify(sessionData));
            document.getElementById('itemCount').textContent = `Items scanned: ${sessionData.items.length}`;
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    displayPreview(e.target.result);
                    analyzeImage(e.target.result);
                };
                img.onerror = () => showError("Image format not supported");
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function displayPreview(src) {
            const container = document.getElementById('previewContainer');
            container.innerHTML = `<div class="preview-container"><img id="preview" src="${src}"></div>`;
        }

        async function analyzeImage(imageData) {
            showLoading(true);
            document.getElementById('error').innerHTML = '';

            try {
                const response = await fetch("/.netlify/functions/analyze", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        imageData: imageData.split(',')[1]
                    })
                });

                const data = await response.json();
                if (data.error) {
                    showError(`Error: ${data.error}`);
                    showLoading(false);
                    return;
                }

                evaluateItem(data.analysis);
            } catch (error) {
                showError(`Error: ${error.message}`);
            }
            showLoading(false);
        }

        function evaluateItem(analysis) {
            let match = null;
            for (const [item, data] of Object.entries(knownItems)) {
                if (item.toLowerCase().includes(analysis.toLowerCase().slice(0, 20))) {
                    match = data;
                    break;
                }
            }

            let result = {};

            if (match) {
                result = { ...match, type: 'KNOWN' };
            } else {
                result = getAIRecommendation(analysis);
            }

            const item = {
                analysis,
                action: result.action,
                category: result.category || detectCategory(analysis),
                reason: result.reason || result.details || '',
                timestamp: new Date().toLocaleTimeString()
            };

            sessionData.items.push(item);

            if (result.action === 'BUNDLE' || (item.category && bundleKeywords[item.category])) {
                const bundle = item.category;
                if (!sessionData.bundles[bundle]) {
                    sessionData.bundles[bundle] = [];
                }
                sessionData.bundles[bundle].push(analysis);
            }

            saveSession();
            displayResult(item, result);
        }

        function detectCategory(analysis) {
            const lower = analysis.toLowerCase();
            for (const [category, keywords] of Object.entries(bundleKeywords)) {
                if (keywords.some(keyword => lower.includes(keyword))) {
                    return category;
                }
            }
            return "Uncategorized";
        }

        function getAIRecommendation(analysis) {
            const lower = analysis.toLowerCase();

            const alwaysGrab = ["patagonia", "arc'teryx", "the north face", "columbia", "carhartt", "levi's", "j.crew", "jjill", "vs pink"];
            const brandMatch = alwaysGrab.find(b => lower.includes(b));
            if (brandMatch && !lower.includes("worn") && !lower.includes("stain")) {
                return { action: "KEEP", reason: "Strong brand", category: detectCategory(analysis) };
            }

            if (lower.includes("new with tag") || lower.includes("nwt")) {
                return { action: "KEEP", reason: "NWT", category: detectCategory(analysis) };
            }

            if (lower.includes("stain") || lower.includes("hole") || lower.includes("damage")) {
                return { action: "END + DONATE", reason: "Damage noted", category: detectCategory(analysis) };
            }

            return { action: "KEEP", reason: "Good condition", category: detectCategory(analysis) };
        }

        function displayResult(item, result) {
            const actionClass = result.action.toLowerCase()
                .replace(/\s+/g, ' ')
                .split(' ')[0]
                .replace('keep', 'keep')
                .replace('send', 'send')
                .replace('lower', 'lower')
                .replace('rework', 'rework')
                .replace('bundle', 'bundle')
                .replace('donate', 'donate')
                .replace('end', 'donate')
                .replace('facebook', 'fbm')
                .replace('notlisted', 'notlisted');

            const bundleHtml = (item.category && sessionData.bundles[item.category]) ? 
                `<div class="bundle-contents">
                    <strong>${item.category}</strong> — ${sessionData.bundles[item.category].length} item${sessionData.bundles[item.category].length > 1 ? 's' : ''} so far
                    ${sessionData.bundles[item.category].slice(0, 3).map((i, idx) => `<div class="bundle-item">• ${i.slice(0, 40)}...</div>`).join('')}
                </div>` : '';

            const html = `
                <div class="result-card ${actionClass}">
                    <div class="action-badge ${actionClass}">${result.action}</div>
                    <div class="item-details">${item.analysis}</div>
                    ${bundleHtml}
                    <div class="reason">→ ${item.reason}</div>
                </div>
            `;

            document.getElementById('result').innerHTML = html;
            updateHistory(item);
        }

        function updateHistory(item) {
            const historyHtml = `Items scanned: ${sessionData.items.length}`;
            document.getElementById('scanHistory').innerHTML = historyHtml;
            document.getElementById('scanHistory').style.display = 'block';
        }

        function showBundleSummary() {
            let html = '<div class="summary-section"><div class="summary-title">📦 Bundle Summary</div>';

            if (Object.keys(sessionData.bundles).length === 0) {
                html += '<div style="color: var(--text-dim); font-size: 13px;">No bundles yet. Keep scanning!</div>';
            } else {
                for (const [bundle, items] of Object.entries(sessionData.bundles)) {
                    const ready = items.length >= 3 ? 'ready' : '';
                    html += `
                        <div class="bundle-summary">
                            <strong>${bundle}</strong>
                            <div class="bundle-status ${ready}">
                                ${items.length} item${items.length > 1 ? 's' : ''} ${items.length >= 3 ? '✅ READY' : '(need ' + (3 - items.length) + ' more)'}
                            </div>
                        </div>
                    `;
                }
            }

            html += '</div>';
            document.getElementById('bundleSummaryContainer').innerHTML = html;
        }

        function showLoading(show) {
            const loader = document.getElementById('loading');
            if (show) {
                loader.innerHTML = '<div class="loading"><span class="spinner"></span>Analyzing...</div>';
            } else {
                loader.innerHTML = '';
            }
        }

        function showError(msg) {
            document.getElementById('error').innerHTML = `<div class="error">⚠️ ${msg}</div>`;
        }

        function resetSession() {
            if (confirm('Clear all scans and bundles?')) {
                sessionData = { items: [], bundles: {} };
                localStorage.removeItem('deathPileSession');
                document.getElementById('result').innerHTML = '';
                document.getElementById('previewContainer').innerHTML = '';
                document.getElementById('scanHistory').style.display = 'none';
                document.getElementById('bundleSummaryContainer').innerHTML = '';
                document.getElementById('itemCount').textContent = 'Items scanned: 0';
            }
        }

        loadSession();
        document.getElementById('itemCount').textContent = `Items scanned: ${sessionData.items.length}`;
    </script>
</body>
</html>
