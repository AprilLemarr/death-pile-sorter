<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --keep: #10b981;
            --send: #0ea5e9;
            --lower: #eab308;
            --rework: #06b6d4;
            --bundle: #a855f7;
            --donate: #dc2626;
            --fbm: #7f1d1d;
            --notlisted: #f97316;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-dim: #cbd5e1;
            --border: #334155;
        }

        body {
            background: linear-gradient(135deg, var(--bg) 0%, #1a1f35 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 12px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 16px 0;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #06b6d4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .session-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 12px;
        }

        .upload-section {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #06b6d4, #0ea5e9);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }

        .btn-secondary:active {
            background: #475569;
        }

        #fileInput, #cameraInput {
            display: none;
        }

        .preview-container {
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        #preview {
            width: 100%;
            height: auto;
            display: block;
            max-height: 300px;
            object-fit: cover;
        }

        .result-card {
            background: var(--card);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 5px solid var(--keep);
            border: 2px solid var(--border);
            border-left: 5px solid var(--keep);
            animation: slideIn 0.3s ease-out;
        }

        .result-card.send { border-left-color: var(--send); }
        .result-card.lower { border-left-color: var(--lower); }
        .result-card.rework { border-left-color: var(--rework); }
        .result-card.bundle { border-left-color: var(--bundle); }
        .result-card.donate { border-left-color: var(--donate); }
        .result-card.fbm { border-left-color: var(--fbm); }
        .result-card.notlisted { border-left-color: var(--notlisted); }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .action-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-badge.keep { background: var(--keep); color: white; }
        .action-badge.send { background: var(--send); color: white; }
        .action-badge.lower { background: var(--lower); color: #000; }
        .action-badge.rework { background: var(--rework); color: white; }
        .action-badge.bundle { background: var(--bundle); color: white; }
        .action-badge.donate { background: var(--donate); color: white; }
        .action-badge.fbm { background: var(--fbm); color: white; }
        .action-badge.notlisted { background: var(--notlisted); color: white; }

        .item-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .item-details {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .reason {
            font-size: 12px;
            color: var(--text-dim);
            font-style: italic;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .bundle-contents {
            background: rgba(168, 85, 247, 0.1);
            padding: 10px;
            border-radius: 4px;
            margin-top: 8px;
            font-size: 12px;
        }

        .bundle-contents strong {
            color: var(--bundle);
        }

        .bundle-item {
            color: var(--text-dim);
            margin: 4px 0;
            padding-left: 12px;
        }

        .summary-section {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .summary-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--bundle);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bundle-summary {
            font-size: 13px;
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(168, 85, 247, 0.05);
            border-left: 3px solid var(--bundle);
            border-radius: 4px;
        }

        .bundle-status {
            font-size: 12px;
            color: var(--text-dim);
        }

        .bundle-status.ready {
            color: var(--keep);
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 16px;
            color: var(--text-dim);
            font-size: 13px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--send);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(220, 38, 38, 0.1);
            border: 2px solid var(--donate);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .btn-small {
            flex: 1;
            padding: 10px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }

        .btn-small.reset {
            background: var(--border);
            color: var(--text);
        }

        .btn-small.reset:active {
            background: #475569;
        }

        .btn-small.summary {
            background: linear-gradient(135deg, var(--bundle), #a855f7);
            color: white;
        }

        .btn-small.summary:active {
            transform: scale(0.98);
        }

        .scan-count {
            text-align: center;
            padding: 8px;
            background: rgba(168, 85, 247, 0.1);
            border-radius: 4px;
            font-size: 12px;
            color: var(--bundle);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .history-scroll {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .history-item {
            font-size: 12px;
            padding: 8px;
            margin: 4px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            border-left: 3px solid var(--border);
        }

        .history-item.keep { border-left-color: var(--keep); }
        .history-item.send { border-left-color: var(--send); }
        .history-item.lower { border-left-color: var(--lower); }
        .history-item.bundle { border-left-color: var(--bundle); }
    </style>
</head>

        let sessionData = {
            items: [],
            bundles: {}

        // Load session from localStorage
        function loadSession() {
            const saved = localStorage.getItem('deathPileSession');
            if (saved) {
                sessionData = JSON.parse(saved);
            }
        }

        // Save session to localStorage
        function saveSession() {
            localStorage.setItem('deathPileSession', JSON.stringify(sessionData));
            document.getElementById('itemCount').textContent = `Items scanned: ${sessionData.items.length}`;
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    displayPreview(e.target.result);
                    analyzeImage(e.target.result);
                };
                img.onerror = () => showError("Image format not supported");
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function displayPreview(src) {
            const container = document.getElementById('previewContainer');
            container.innerHTML = `<div class="preview-container"><img id="preview" src="${src}"></div>`;
        }

        async function analyzeImage(imageData) {
            showLoading(true);
            document.getElementById('error').innerHTML = '';

            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 500,
                        messages: [
                            {
                                role: "user",
                                content: [
                                    {
                                        type: "image",
                                        source: {
                                            type: "base64",
                                            media_type: "image/jpeg",
                                            data: imageData.split(',')[1]
                                        }
                                    },
                                    {
                                        type: "text",
                                        text: `Analyze this clothing item QUICKLY. Give me:
1. Brand (or best guess)
2. Item type (shirt, sweater, dress, etc)
3. Color(s)
4. Size
5. Condition (new with tag, excellent, good, fair, worn)

Be concise. One line per field. If you can't see it clearly, ask ONE specific question.`
                                    }
                                ]
                            }
                        ]
                    })
                });

                const data = await response.json();
                if (data.error) {
                    showError(`API Error: ${data.error.message}`);
                    showLoading(false);
                    return;
                }

                const analysis = data.content[0].text;
                evaluateItem(analysis);
            } catch (error) {
                showError(`Error: ${error.message}`);
            }
            showLoading(false);
        }

        function evaluateItem(analysis) {
            // Check known items first (exact matching on analysis)
            let match = null;
            for (const [item, data] of Object.entries(knownItems)) {
                if (item.toLowerCase().includes(analysis.toLowerCase().slice(0, 20))) {
                    match = data;
                    break;
                }
            }

            let result = {};

            if (match) {
                result = { ...match, type: 'KNOWN' };
            } else {
                // AI recommendation based on brand guide and bundle categories
                result = getAIRecommendation(analysis);
            }

            // Add to session and determine bundle
            const item = {
                analysis,
                action: result.action,
                category: result.category || detectCategory(analysis),
                reason: result.reason || result.details || '',
                timestamp: new Date().toLocaleTimeString()
            };

            sessionData.items.push(item);

            // Track bundles
            if (result.action === 'BUNDLE' || (item.category && bundleKeywords[item.category])) {
                const bundle = item.category;
                if (!sessionData.bundles[bundle]) {
                    sessionData.bundles[bundle] = [];
                }
                sessionData.bundles[bundle].push(analysis);
            }

            saveSession();
            displayResult(item, result);
        }

        function detectCategory(analysis) {
            const lower = analysis.toLowerCase();
            for (const [category, keywords] of Object.entries(bundleKeywords)) {
                if (keywords.some(keyword => lower.includes(keyword))) {
                    return category;
                }
            }
            return "Uncategorized";
        }

        function getAIRecommendation(analysis) {
            const lower = analysis.toLowerCase();

            // Brand-based decisions
            const alwaysGrab = ["patagonia", "arc'teryx", "the north face", "columbia", "carhartt", "levi's", "j.crew", "jjill", "vs pink"];
            const brandMatch = alwaysGrab.find(b => lower.includes(b));
            if (brandMatch && !lower.includes("worn") && !lower.includes("stain")) {
                return { action: "KEEP", reason: "Strong brand", category: detectCategory(analysis) };
            }

            // Condition-based
            if (lower.includes("new with tag") || lower.includes("nwt")) {
                return { action: "KEEP", reason: "NWT", category: detectCategory(analysis) };
            }

            if (lower.includes("stain") || lower.includes("hole") || lower.includes("damage")) {
                return { action: "END + DONATE", reason: "Damage noted", category: detectCategory(analysis) };
            }

            // Default: KEEP for good condition items
            return { action: "KEEP", reason: "Good condition", category: detectCategory(analysis) };
        }

        function displayResult(item, result) {
            const actionClass = result.action.toLowerCase()
                .replace(/\s+/g, ' ')
                .split(' ')[0]
                .replace('keep', 'keep')
                .replace('send', 'send')
                .replace('lower', 'lower')
                .replace('rework', 'rework')
                .replace('bundle', 'bundle')
                .replace('donate', 'donate')
                .replace('end', 'donate')
                .replace('facebook', 'fbm')
                .replace('notlisted', 'notlisted');

            const bundleHtml = (item.category && sessionData.bundles[item.category]) ? 
                `<div class="bundle-contents">
                    <strong>${item.category}</strong> — ${sessionData.bundles[item.category].length} item${sessionData.bundles[item.category].length > 1 ? 's' : ''} so far
                    ${sessionData.bundles[item.category].slice(0, 3).map((i, idx) => `<div class="bundle-item">• ${i.slice(0, 40)}...</div>`).join('')}
                </div>` : '';

            const html = `
                <div class="result-card ${actionClass}">
                    <div class="action-badge ${actionClass}">${result.action}</div>
                    <div class="item-details">${item.analysis}</div>
                    ${bundleHtml}
                    <div class="reason">→ ${item.reason}</div>
                </div>
            `;

            document.getElementById('result').innerHTML = html;
            updateHistory(item);
        }

        function updateHistory(item) {
            const actionShort = item.action.split(' ')[0];
            const historyHtml = `Items scanned: ${sessionData.items.length}`;
            document.getElementById('scanHistory').innerHTML = historyHtml;
            document.getElementById('scanHistory').style.display = 'block';
        }

        function showBundleSummary() {
            let html = '<div class="summary-section"><div class="summary-title">📦 Bundle Summary</div>';

            if (Object.keys(sessionData.bundles).length === 0) {
                html += '<div style="color: var(--text-dim); font-size: 13px;">No bundles yet. Keep scanning!</div>';
            } else {
                for (const [bundle, items] of Object.entries(sessionData.bundles)) {
                    const ready = items.length >= 3 ? 'ready' : '';
                    html += `
                        <div class="bundle-summary">
                            <strong>${bundle}</strong>
                            <div class="bundle-status ${ready}">
                                ${items.length} item${items.length > 1 ? 's' : ''} ${items.length >= 3 ? '✅ READY' : '(need ' + (3 - items.length) + ' more)'}
                            </div>
                        </div>
                    `;
                }
            }

            html += '</div>';
            document.getElementById('bundleSummaryContainer').innerHTML = html;
        }

        function showLoading(show) {
            const loader = document.getElementById('loading');
            if (show) {
                loader.innerHTML = '<div class="loading"><span class="spinner"></span>Analyzing...</div>';
            } else {
                loader.innerHTML = '';
            }
        }

        function showError(msg) {
            document.getElementById('error').innerHTML = `<div class="error">⚠️ ${msg}</div>`;
        }

        function resetSession() {
            if (confirm('Clear all scans and bundles?')) {
                sessionData = { items: [], bundles: {} };
                localStorage.removeItem('deathPileSession');
                document.getElementById('result').innerHTML = '';
                document.getElementById('previewContainer').innerHTML = '';
                document.getElementById('scanHistory').style.display = 'none';
                document.getElementById('bundleSummaryContainer').innerHTML = '';
                document.getElementById('itemCount').textContent = 'Items scanned: 0';
            }
        }

        // Load on startup
        loadSession();
        document.getElementById('itemCount').textContent = `Items scanned: ${sessionData.items.length}`;
    </script>
</body>
</html>
